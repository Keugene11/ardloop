name: Build & Upload Android to Play Store

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install

      - name: Sync Capacitor Android
        run: |
          mkdir -p android/app/src/main/assets/public
          npx cap sync android

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Set build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          cd android
          sed -i "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.$BUILD_NUMBER\"/" app/build.gradle

      - name: Build release AAB
        env:
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ardsleypost-android-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Clean up
        if: always()
        run: rm -f /tmp/keystore.jks
